services:
  db:
    image: ankane/pgvector:latest
    container_name: eventos_db
    restart: always
    environment:
      POSTGRES_USER: pablo_admin
      POSTGRES_PASSWORD: password123 
      POSTGRES_DB: eventos_municipalidad
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: eventos_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: